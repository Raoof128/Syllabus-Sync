name: Push Reminders Cron

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  push-reminders:
    name: Trigger push reminders endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Call push reminders cron endpoint
        env:
          PUSH_REMINDERS_CRON_URL: ${{ secrets.PUSH_REMINDERS_CRON_URL }}
          PUSH_REMINDERS_CRON_SECRET: ${{ secrets.PUSH_REMINDERS_CRON_SECRET }}
        run: |
          if [ -z "$PUSH_REMINDERS_CRON_URL" ] || [ -z "$PUSH_REMINDERS_CRON_SECRET" ]; then
            echo "Missing required secrets: PUSH_REMINDERS_CRON_URL and/or PUSH_REMINDERS_CRON_SECRET"
            exit 1
          fi

          curl --fail --silent --show-error \
            -H "Authorization: Bearer $PUSH_REMINDERS_CRON_SECRET" \
            "$PUSH_REMINDERS_CRON_URL" | cat
