name: Production Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_ENV: production

jobs:
  validate-and-build:
    name: Validate and Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build_ready: ${{ steps.mark.outputs.build_ready }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Validate required secrets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          required=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            VERCEL_TOKEN
            VERCEL_ORG_ID
            VERCEL_PROJECT_ID
          )

          for secret_name in "${required[@]}"; do
            if [ -z "${!secret_name:-}" ]; then
              echo "Missing required secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Run static checks
        run: |
          npm run typecheck
          npm run lint
          npm run check:secrets

      - name: Run security audit
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests
        run: npm run test:ci

      - name: Build application
        run: npm run build

      - name: Mark build ready
        id: mark
        run: echo "build_ready=true" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: .next/
          retention-days: 14

  deploy-to-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: validate-and-build
    if: needs.validate-and-build.outputs.build_ready == 'true'
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          deploy_output=$(vercel --prod --yes --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" 2>&1)
          echo "$deploy_output"

          deployment_url=$(echo "$deploy_output" | grep -Eo 'https://[^ ]+\.vercel\.app' | tail -n 1)

          if [ -z "$deployment_url" ]; then
            echo "Failed to capture deployment URL"
            exit 1
          fi

          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

  post-deployment-verification:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: deploy-to-vercel

    steps:
      - name: Health check
        env:
          DEPLOYMENT_URL: ${{ needs.deploy-to-vercel.outputs.deployment_url }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Deployment URL is missing"
            exit 1
          fi

          curl --fail --silent --show-error --retry 5 --retry-delay 5 "$DEPLOYMENT_URL" >/dev/null

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: config/lighthouse/.lighthouserc.json
          urls: |
            ${{ needs.deploy-to-vercel.outputs.deployment_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [validate-and-build, deploy-to-vercel, post-deployment-verification]
    if: always()

    steps:
      - name: Notify failure
        if: contains(join(needs.*.result, ','), 'failure')
        run: echo "Production deployment pipeline failed."

      - name: Notify success
        if: ${{ !contains(join(needs.*.result, ','), 'failure') }}
        run: echo "Production deployment pipeline completed successfully."
